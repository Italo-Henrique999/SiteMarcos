<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcos Artesanato</title>

<style>
body{font-family:Arial;background:#f7f5f2;margin:0}
.header{background:#6b4f3a;color:#fff;padding:20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.product-card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.product-name{font-weight:bold}
.product-price{color:#6b4f3a;font-weight:bold}
button{padding:10px;border:none;border-radius:8px;background:#27ae60;color:#fff;cursor:pointer}
.checkout{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;display:flex;justify-content:space-between}
</style>
</head>
<body>

<div class="header">
<h1>Peças Artesanais</h1>
</div>

<div class="products" id="productsGrid"></div>

<div class="checkout">
<span id="cartTotal">R$ 0,00</span>
<button onclick="alert('Pagamento depois')">Finalizar</button>
</div>

<script>
var products = [
{id:1,name:"Cachorro Sentado",price:500,desc:"Escultura em madeira"},
{id:2,name:"Escultura Baleia",price:650,desc:"Inspirada em Vidas Secas"},
{id:3,name:"Homem Sertanejo",price:450,desc:"Figura típica do sertão"},
{id:4,name:"Casal Nordestino",price:700,desc:"Peça decorativa artesanal"}
];

var cart=[];

function renderProducts(){
let html="";
products.forEach(p=>{
html+=`
<div class="product-card">
<div class="product-name">${p.name}</div>
<div>${p.desc}</div>
<div class="product-price">R$ ${p.price.toFixed(2)}</div>
<button onclick="addToCart(${p.id})">Adicionar</button>
</div>`;
});
document.getElementById("productsGrid").innerHTML=html;
}

function addToCart(id){
let item=products.find(p=>p.id===id);
let found=cart.find(c=>c.id===id);
if(found){found.qty++;}else{cart.push({...item,qty:1});}
updateCart();
}

function updateCart(){
let total=0;
cart.forEach(i=> total+=i.price*i.qty);
document.getElementById("cartTotal").textContent="R$ "+total.toFixed(2);
}

renderProducts();
</script>

</body>
</html>
